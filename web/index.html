<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QalaQoz AI Chat</title>
  <style>
    :root {
      --bg-color: #f0f4f9;
      --sidebar-bg: #e3e8ee;
      --chat-bg: #ffffff;
      --user-msg: #e3e3e3;
      --bot-msg: #ffffff;
      --text-main: #1f1f1f;
      --text-muted: #444746;
      --accent: #0b57d0;
      --hover-bg: #d3d9e0;
      --border: #c7c7c7;
      --icon-color: #1f1f1f;
      --btn-bg: #0b57d0;
      --btn-text: #ffffff;
      --btn-hover: #0842a0;
      --btn-shadow: rgba(11, 87, 208, 0.25);
      --send-grad-start: #0b57d0;
      --send-grad-end: #2e8cff;
      --send-shadow: rgba(11, 87, 208, 0.35);
    }

    body.dark-mode {
      --bg-color: #131314;
      --sidebar-bg: #1e1f20;
      --chat-bg: #1e1f20;
      --user-msg: #004a77;
      --bot-msg: #1e1f20;
      --text-main: #e3e3e3;
      --text-muted: #c4c7c5;
      --accent: #a8c7fa;
      --hover-bg: #333639;
      --border: #444746;
      --icon-color: #e3e3e3;
      --btn-bg: #a8c7fa;
      --btn-text: #041e49;
      --btn-hover: #d3e3fd;
      --btn-shadow: rgba(168, 199, 250, 0.15);
      --send-grad-start: #84b7ff;
      --send-grad-end: #a8c7fa;
      --send-shadow: rgba(168, 199, 250, 0.32);
    }

    * { box-sizing: border-box; }
    body, .sidebar, .main-content, .input-wrapper, .message, input, button, svg, .history-item {
      transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, fill 0.35s ease;
    }

    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-right: 1px solid var(--border);
      transition: width 0.35s ease, padding 0.35s ease, opacity 0.25s ease;
      overflow: hidden;
      white-space: nowrap;
    }

    .sidebar.collapsed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border-right: none;
      opacity: 0;
    }

    .new-chat-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 12px var(--btn-shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
    }

    .new-chat-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px var(--btn-shadow);
    }

    .new-chat-btn svg { fill: var(--btn-text); transition: transform 0.3s ease; }
    .new-chat-btn:hover svg { transform: rotate(90deg); }

    .history-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .history-list::-webkit-scrollbar { display: none; }

    .history-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
    }
    .history-item:hover { background: var(--hover-bg); }
    .history-item.active { border-color: var(--accent); background: var(--hover-bg); }

    .context-menu {
      position: fixed;
      z-index: 9999;
      min-width: 150px;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--chat-bg);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition: opacity 0.14s ease, transform 0.14s ease;
    }

    .context-menu.show {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .context-menu button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: left;
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      font-size: 14px;
    }
    .context-menu button:hover {
      background: var(--hover-bg);
      color: #d92d20;
    }

    .theme-toggle-btn {
      margin-top: auto;
      background: none;
      border: none;
      color: var(--text-main);
      padding: 12px;
      cursor: pointer;
      border-radius: 8px;
      text-align: left;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }
    .theme-toggle-btn:hover { background: var(--hover-bg); }
    .theme-toggle-btn svg { width: 20px; height: 20px; fill: var(--icon-color); }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-color);
    }

    header {
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-btn:hover { background: var(--hover-bg); }
    .menu-btn svg { width: 24px; height: 24px; fill: var(--icon-color); }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    #chat-container::-webkit-scrollbar { display: none; }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message {
      padding: 16px 22px;
      border-radius: 22px;
      max-width: 82%;
      line-height: 1.55;
      font-size: 16px;
      animation: slideInUp 0.3s ease forwards;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user-message {
      background: var(--user-msg);
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .bot-message {
      background: var(--bot-msg);
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border);
    }

    .bot-meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .grounding-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .grounding-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .grounding-badge.good {
      background: rgba(20, 122, 72, 0.12);
      color: #0f7a49;
    }

    .grounding-badge.weak {
      background: rgba(176, 94, 0, 0.12);
      color: #a85b00;
    }

    body.dark-mode .grounding-badge.good {
      background: rgba(102, 218, 155, 0.16);
      color: #8ef0be;
    }

    body.dark-mode .grounding-badge.weak {
      background: rgba(255, 189, 89, 0.16);
      color: #ffd089;
    }

    .grounding-reason {
      font-size: 12px;
      color: var(--text-muted);
    }

    .sources-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sources-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .source-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--chat-bg) 86%, var(--bg-color) 14%);
    }

    .source-topline {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .source-name {
      font-size: 13px;
      font-weight: 600;
    }

    .source-rank {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .source-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .source-snippet {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-main);
      opacity: 0.92;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 14px;
      padding: 6px 24px;
    }

    .loader-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(128, 128, 128, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .cursor {
      display: inline-block;
      width: 7px;
      margin-left: 1px;
      animation: blink 1s steps(2, start) infinite;
    }
    @keyframes blink { to { opacity: 0; } }

    .input-area {
      padding: 20px;
      display: flex;
      justify-content: center;
      background: var(--bg-color);
    }

    .input-wrapper {
      display: flex;
      max-width: 860px;
      width: 100%;
      background: var(--chat-bg);
      border-radius: 30px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      align-items: center;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px;
      font-size: 16px;
      background: transparent;
      color: var(--text-main);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--send-grad-start) 0%, var(--send-grad-end) 100%);
      border: none;
      cursor: pointer;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 14px var(--send-shadow);
      transition: filter 0.2s ease, transform 0.2s ease;
    }
    .send-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.55; cursor: default; }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <button class="new-chat-btn" id="new-chat-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Новый чат
    </button>

    <div class="history-title">Недавние</div>
    <div class="history-list" id="history-list"></div>

    <button class="theme-toggle-btn" id="theme-btn">
      <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
      <span id="theme-text">Темная тема</span>
    </button>
  </aside>

  <main class="main-content">
    <header>
      <button class="menu-btn" id="menu-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <span>Nurs AI</span>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Введите ваш запрос..." />
        <button class="send-btn" id="send-btn" title="Отправить">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M21.4 3.2 2.9 10.8c-.8.3-.8 1.4 0 1.7l5.9 2.1 2.2 6c.3.8 1.4.8 1.8 0L21.4 4.9c.3-.7-.3-1.9-1.1-1.7zM10.4 13.8l8.7-7.1-6.9 8.9c-.1.2-.3.3-.5.3-.3 0-.5-.2-.6-.5l-1.2-3.2c-.1-.2 0-.5.2-.7.1-.1.2-.2.3-.2z"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <div class="context-menu" id="chat-context-menu">
    <button id="delete-chat-action">Удалить чат</button>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/api/chat";
    const USE_REAL_API = true;
    const MODE = "rag";
    const STORAGE_KEY = "qalaqoz_chat_store_v1";
    const DEFAULT_BOT_MESSAGE = "Сәлем! Я готов к работе. Чем могу помочь сегодня?";

    const chatContainer = document.getElementById("chat-container");
    const historyList = document.getElementById("history-list");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const newChatBtn = document.getElementById("new-chat-btn");
    const menuBtn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");
    const themeBtn = document.getElementById("theme-btn");
    const themeIcon = document.getElementById("theme-icon");
    const themeText = document.getElementById("theme-text");
    const contextMenu = document.getElementById("chat-context-menu");
    const deleteChatAction = document.getElementById("delete-chat-action");

    const sunIcon = `<path d="M6.76 4.84 5.35 3.43 3.93 4.85l1.41 1.41zm10.48 0 1.41-1.41-1.41-1.41-1.42 1.41zM12 5a7 7 0 1 0 0 14 7 7 0 0 0 0-14zm0-5h-1v3h2V0zm0 21h-1v3h2v-3zM1 13h3v-2H1zm19 0h3v-2h-3zM6.76 19.16l-1.41 1.41 1.41 1.41 1.41-1.41zm10.48 0-1.42 1.41 1.42 1.41 1.41-1.41z"/>`;
    const moonIcon = `<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>`;

    let chats = [];
    let activeChatId = null;
    let sending = false;
    let contextChatId = null;

    function uid() { return `${Date.now()}_${Math.random().toString(16).slice(2)}`; }
    function activeChat() { return chats.find(c => c.id === activeChatId) || null; }
    function toTitle(text) { return (text || "").replace(/\s+/g, " ").trim().slice(0, 42) || "Новый чат"; }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        chats,
        activeChatId,
        dark: document.body.classList.contains("dark-mode")
      }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const state = JSON.parse(raw);
        chats = Array.isArray(state.chats) ? state.chats : [];
        activeChatId = state.activeChatId || null;
        if (state.dark) {
          document.body.classList.add("dark-mode");
          themeIcon.innerHTML = sunIcon;
          themeText.textContent = "Светлая тема";
        }
        return chats.length > 0;
      } catch {
        return false;
      }
    }

    function createChat() {
      const chat = {
        id: uid(),
        title: "Новый чат",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        messages: [{ role: "bot", text: DEFAULT_BOT_MESSAGE }]
      };
      chats.unshift(chat);
      activeChatId = chat.id;
      saveState();
      renderHistory();
      renderChat();
    }

    function selectChat(id) {
      activeChatId = id;
      saveState();
      renderHistory();
      renderChat();
    }

    function deleteChat(id) {
      const idx = chats.findIndex(c => c.id === id);
      if (idx === -1) return;
      chats.splice(idx, 1);
      if (activeChatId === id) activeChatId = chats[0]?.id || null;
      if (chats.length === 0) return createChat();
      saveState();
      renderHistory();
      renderChat();
    }

    function showContextMenu(x, y, chatId) {
      contextChatId = chatId;
      contextMenu.style.left = `${x}px`;
      contextMenu.style.top = `${y}px`;
      contextMenu.classList.add("show");
    }

    function hideContextMenu() {
      contextMenu.classList.remove("show");
      contextChatId = null;
    }

    function renderHistory() {
      historyList.innerHTML = "";
      chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = "history-item" + (chat.id === activeChatId ? " active" : "");
        item.textContent = chat.title || "Новый чат";
        item.title = chat.title || "Новый чат";
        item.onclick = () => selectChat(chat.id);
        item.oncontextmenu = (event) => {
          event.preventDefault();
          showContextMenu(event.clientX, event.clientY, chat.id);
        };
        historyList.appendChild(item);
      });
    }

    function buildSourceMeta(message) {
      if (message.role !== "bot") return null;
      const hasGrounding = !!message.grounding;
      const hasSources = Array.isArray(message.sources) && message.sources.length > 0;
      if (!hasGrounding && !hasSources) return null;

      const meta = document.createElement("div");
      meta.className = "bot-meta";

      if (hasGrounding) {
        const row = document.createElement("div");
        row.className = "grounding-row";

        const badge = document.createElement("span");
        badge.className = `grounding-badge ${message.grounding.grounded ? "good" : "weak"}`;
        badge.textContent = message.grounding.grounded
          ? `Grounded • ${message.grounding.evidence_count || 0} sources`
          : `Weak context • ${message.grounding.evidence_count || 0} sources`;
        row.appendChild(badge);

        const reason = document.createElement("span");
        reason.className = "grounding-reason";
        reason.textContent = message.grounding.reason || "";
        row.appendChild(reason);

        meta.appendChild(row);
      }

      if (hasSources) {
        const wrap = document.createElement("div");
        wrap.className = "sources-wrap";

        const title = document.createElement("div");
        title.className = "sources-title";
        title.textContent = "Sources";
        wrap.appendChild(title);

        const list = document.createElement("div");
        list.className = "source-list";

        message.sources.forEach((source) => {
          const card = document.createElement("div");
          card.className = "source-card";

          const topline = document.createElement("div");
          topline.className = "source-topline";

          const name = document.createElement("span");
          name.className = "source-name";
          name.textContent = source.source_name || source.doc_id || "Unknown source";
          topline.appendChild(name);

          const rank = document.createElement("span");
          rank.className = "source-rank";
          rank.textContent = `#${source.rank || 0}`;
          topline.appendChild(rank);
          card.appendChild(topline);

          const metaLine = document.createElement("div");
          metaLine.className = "source-meta";
          const metaParts = [];
          if (source.title) metaParts.push(source.title);
          if (source.section && source.section !== source.title) metaParts.push(source.section);
          if (Array.isArray(source.chunk_ids) && source.chunk_ids.length) {
            metaParts.push(source.chunk_ids.join(", "));
          }
          metaLine.textContent = metaParts.join(" • ");
          if (metaLine.textContent) card.appendChild(metaLine);

          const snippet = document.createElement("div");
          snippet.className = "source-snippet";
          const rawText = (source.text || "").trim();
          snippet.textContent = rawText.length > 180 ? `${rawText.slice(0, 177)}...` : rawText;
          if (snippet.textContent) card.appendChild(snippet);

          list.appendChild(card);
        });

        wrap.appendChild(list);
        meta.appendChild(wrap);
      }

      return meta;
    }

    function appendMessageElement(messageOrText, role) {
      const message = typeof messageOrText === "string"
        ? { role, text: messageOrText, sources: [], grounding: null }
        : messageOrText;
      const div = document.createElement("div");
      div.className = `message ${message.role === "user" ? "user-message" : "bot-message"}`;

      const content = document.createElement("div");
      content.textContent = message.text;
      div.appendChild(content);

      const meta = buildSourceMeta(message);
      if (meta) div.appendChild(meta);

      chatContainer.appendChild(div);
      return div;
    }

    function renderChat() {
      chatContainer.innerHTML = "";
      const chat = activeChat();
      if (!chat) return;
      chat.messages.forEach(m => appendMessageElement(m, m.role));
      scrollToBottom();
    }

    function scrollToBottom() {
      chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: "smooth" });
    }

    function addMessage(role, text, extras = {}) {
      const chat = activeChat();
      if (!chat) return;
      chat.messages.push({ role, text, ...extras });
      chat.updatedAt = Date.now();
      if (role === "user" && chat.title === "Новый чат") chat.title = toTitle(text);
      chats.sort((a, b) => b.updatedAt - a.updatedAt);
      activeChatId = chat.id;
      saveState();
      renderHistory();
    }

    async function animateBotText(message) {
      const msg = document.createElement("div");
      msg.className = "message bot-message";
      const content = document.createElement("div");
      msg.appendChild(content);
      chatContainer.appendChild(msg);
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "|";
      content.appendChild(cursor);
      for (const ch of String(message.text || "")) {
        content.insertBefore(document.createTextNode(ch), cursor);
        scrollToBottom();
        await new Promise(r => setTimeout(r, 9));
      }
      cursor.remove();
      const meta = buildSourceMeta(message);
      if (meta) msg.appendChild(meta);
      scrollToBottom();
    }

    function setTyping(on) {
      const id = "typing-indicator";
      document.getElementById(id)?.remove();
      if (!on) return;
      const typing = document.createElement("div");
      typing.id = id;
      typing.className = "typing";
      typing.innerHTML = `
        <span>QalaQoz думает</span>
        <span class="loader-spinner" aria-hidden="true"></span>
      `;
      chatContainer.appendChild(typing);
      scrollToBottom();
    }

    async function sendMessage() {
      if (sending) return;
      const text = userInput.value.trim();
      if (!text) return;

      sending = true;
      sendBtn.disabled = true;
      userInput.value = "";

      addMessage("user", text);
      appendMessageElement(text, "user");
      setTyping(true);

      try {
        let botMessage = null;
        if (USE_REAL_API) {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text, mode: MODE })
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          botMessage = {
            role: "bot",
            text: data.reply || "Empty server response.",
            sources: Array.isArray(data.sources) ? data.sources : [],
            grounding: data.grounding || null
          };
        } else {
          await new Promise(r => setTimeout(r, 900));
          botMessage = {
            role: "bot",
            text: "Test response. Enable USE_REAL_API=true for live backend answers.",
            sources: [],
            grounding: null
          };
        }

        setTyping(false);
        addMessage("bot", botMessage.text, {
          sources: botMessage.sources,
          grounding: botMessage.grounding
        });
        await animateBotText(botMessage);
      } catch (err) {
        setTyping(false);
        const fail = "Server connection error.";
        addMessage("bot", fail);
        await animateBotText({ role: "bot", text: fail, sources: [], grounding: null });
        console.error(err);
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }


    function toggleSidebar() { sidebar.classList.toggle("collapsed"); }

    function toggleTheme() {
      document.body.classList.toggle("dark-mode");
      if (document.body.classList.contains("dark-mode")) {
        themeIcon.innerHTML = sunIcon;
        themeText.textContent = "Светлая тема";
      } else {
        themeIcon.innerHTML = moonIcon;
        themeText.textContent = "Темная тема";
      }
      saveState();
    }

    menuBtn.addEventListener("click", toggleSidebar);
    themeBtn.addEventListener("click", toggleTheme);
    newChatBtn.addEventListener("click", createChat);
    sendBtn.addEventListener("click", sendMessage);
    deleteChatAction.addEventListener("click", () => {
      if (contextChatId) deleteChat(contextChatId);
      hideContextMenu();
    });

    document.addEventListener("click", hideContextMenu);
    window.addEventListener("resize", hideContextMenu);
    window.addEventListener("scroll", hideContextMenu, true);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") hideContextMenu();
    });

    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    if (!loadState()) {
      createChat();
    } else {
      renderHistory();
      if (!activeChat()) activeChatId = chats[0]?.id || null;
      if (!activeChatId) createChat();
      else renderChat();
    }
  </script>
</body>
</html>
