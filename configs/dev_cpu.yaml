project:
  name: "llm-ml-assistant"
  version: "0.1"

model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  device: "cpu"
  max_tokens: 256

embeddings:
  name: "intfloat/e5-base"

rag:
  chunk_size: 320
  chunk_overlap: 64
  top_k: 4
  retrieval_mode: "hybrid"
  rrf_k: 60

paths:
  data_dir: "data/examples"
  artifacts_dir: "artifacts"
  logs_dir: "logs"
