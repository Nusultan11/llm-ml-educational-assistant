project:
  name: "llm-ml-assistant"
  version: "0.1"

model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  device: "cpu"
  max_tokens: 256

embeddings:
  name: "sentence-transformers/all-MiniLM-L6-v2"

rag:
  # Safer for local laptops: smaller chunks and lower memory pressure.
  chunk_size: 320
  chunk_overlap: 64
  top_k: 4

paths:
  data_dir: "data/examples"
  artifacts_dir: "artifacts"
  logs_dir: "logs"
