project:
  name: "llm-ml-assistant"
  version: "0.1"

model:
  name: "microsoft/Phi-3-mini-4k-instruct"
  device: "cuda"
  max_tokens: 256

embeddings:
  name: "BAAI/bge-base-en"

rag:
  # Colab free-friendly profile: hybrid retrieval + lighter generation model.
  chunk_size: 700
  chunk_overlap: 40
  top_k: 5
  retrieval_mode: "hybrid"
  rrf_k: 60
  reranker_enabled: true
  reranker_type: "token_overlap"
  reranker_candidate_k: 20
  quality_gate_enabled: true
  quality_gate_min_score: 0.35
  quality_gate_min_coverage: 0.2
  quality_gate_min_strong_results: 1
  context_max_blocks: 3
  context_max_chars: 1800
  context_max_chunks_per_doc: 2
  context_dedup_threshold: 0.8
  context_expand_neighbors: true

paths:
  data_dir: "data/examples"
  artifacts_dir: "artifacts"
  logs_dir: "logs"
