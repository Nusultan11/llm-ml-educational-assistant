project:
  name: "llm-ml-assistant"
  version: "0.1"

model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  device: "cuda"
  max_tokens: 384

embeddings:
  name: "BAAI/bge-base-en"

rag:
  chunk_size: 600
  chunk_overlap: 100
  top_k: 5
  retrieval_mode: "hybrid"
  rrf_k: 60

paths:
  data_dir: "data/examples"
  artifacts_dir: "artifacts"
  logs_dir: "logs"
