project:
  name: "llm-ml-assistant"
  version: "0.1"

model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  device: "cuda"
  max_tokens: 384

embeddings:
  name: "sentence-transformers/all-MiniLM-L6-v2"

rag:
  # Tuned for Colab T4-like sessions:
  # slightly bigger chunks and higher recall while keeping prompt bounded.
  chunk_size: 600
  chunk_overlap: 100
  top_k: 5

paths:
  data_dir: "data/examples"
  artifacts_dir: "artifacts"
  logs_dir: "logs"
